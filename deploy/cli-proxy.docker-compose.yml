# deploy/cli-proxy.docker-compose.yml — L2/L3 CLIProxyAPI(claude-tri)
# 建议落位: /opt/cli-proxy-api/docker-compose.yml
# 同目录放真实 config.yaml(参照 ./config.example.yaml 填写)与 auths/ 号池 —— 两者均被仓库 .gitignore 排除,永不入库
services:
  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest # 上线前建议 pin 具体 tag(PLAN.md §9-4)
    container_name: cli-proxy-api
    ports:
      # 仅绑回环;公网由 Caddy 的 codex.selab.top 反代(PLAN.md §8-1)
      - "127.0.0.1:8317:8317"
      # OAuth 回调口:仅交互式登录号池时临时取消注释,用完即恢复;
      # 平时走 SSH 隧道在本地浏览器完成(PLAN.md §8-2):
      #   ssh -p 48687 -L 1455:127.0.0.1:1455 winbeau@70.39.193.15
      # - "127.0.0.1:1455:1455"     # codex 回调
      # - "127.0.0.1:54545:54545"   # claude 回调
      # - "127.0.0.1:51121:51121"   # antigravity 回调
      # - "127.0.0.1:8085:8085"
      # - "127.0.0.1:11451:11451"
    volumes:
      - ./config.yaml:/CLIProxyAPI/config.yaml
      - ./auths:/root/.cli-proxy-api
      - ./logs:/CLIProxyAPI/logs
    # MANAGEMENT_PASSWORD: 明文管理密钥,CLIProxyAPI 用它做 Bearer 鉴权
    # (与 config.yaml 里 bcrypt 哈希的 secret-key 并列,明文走 ConstantTimeCompare)。
    # 设了它还会自动解除 allow-remote:false 的限制,让 new-api 从 docker 内网调管理 API。
    # 该 env 文件由 setup-pool-mgmt.sh 生成(同一个明文既写 MANAGEMENT_PASSWORD 给
    # 本容器、也写 POOL_MGMT_SECRET 给 new-api),被仓库 .gitignore 挡,永不入库。
    env_file:
      - ./.pool-mgmt.env
    restart: unless-stopped
    networks:
      - xju-net

networks:
  # L1↔L2 专用网络: new-api 也接入本网络,用容器名 cli-proxy-api:8317 访问,
  # 因为宿主的 127.0.0.1:8317 在 new-api 容器内不可见。不发布端口,无公网暴露面。
  #
  # external: 该网络由 new-api.run.sh 用 `docker network create xju-net` 先建;
  # 不声明 external 的话 compose 会因缺少自己的标签而拒绝复用它。
  xju-net:
    external: true
    name: xju-net
